# tokyonight — accents referenced as #{@accent}/#{@accent2} from tmux.conf formats
set -g @accent  'magenta'
set -g @accent2 'blue'
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style        'fg=colour240,bg=colour234'
set -g window-style             'fg=colour245,bg=colour234'
