# gruvbox material (hard) — accents referenced as #{@accent}/#{@accent2} from tmux.conf formats
set -g @accent  '#e78a4e'
set -g @accent2 '#7daea3'
set -g pane-active-border-style 'fg=#e78a4e,bg=default'
set -g pane-border-style        'fg=#504945,bg=#1d2021'
set -g window-style             'fg=#928374,bg=#1d2021'
