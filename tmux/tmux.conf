set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/bin:/usr/bin"

set -sg escape-time 0
set -g prefix C-a
set -s set-clipboard off
set -g base-index 1
set -g pane-base-index 1
set -g escape-time 0          # zero-out escape time delay
set -g history-limit 1000  # significantly increase history size
set -g renumber-windows on    # renumber all windows when any window is closed
set -g set-clipboard on       # use system clipboard
set -g status-interval 2      # update status every 2 seconds
set -g status-left-length 10 # increase status line length
set -g status-position bottom    # macOS / darwin style

# colors — theme symlink managed by `theme` (~/.config/theme/theme.sh)
source-file -q ~/.config/tmux/current-theme.conf
set -g window-active-style          'fg=terminal,bg=terminal'
set -g status-style                 'bg=default' # transparent
set -g automatic-rename on
# automatic-rename-format is set by tmux-nerd-font-window-name plugin
# folder suffix only for auto-named windows; manually renamed ones (e.g. by Claude) show just their name
set -g window-status-current-format '#[fg=#{@accent},bold]#I. #W#{?automatic-rename, #{b:pane_current_path},} #[fg=#{@accent},nobold]│'
set -g window-status-format         '#[fg=gray]#I. #W#{?automatic-rename, #{b:pane_current_path},} #[fg=#{@accent}]│'

set -g status-left  ' #[fg=#{@accent2},bold]#S | #[fg=white,nobold]'
set -g status-right '#(gitmux -cfg $HOME/.config/tmux/gitmux.conf "#{pane_current_path}")'

set -g default-terminal 'screen-256color'
set -sa terminal-features ',xterm-256color:RGB'
set -g allow-passthrough on       # allow kitty desktop notifications (OSC 99)

unbind C-b
bind C-a send-prefix

unbind %
bind \\ split-window -h -c '#{pane_current_path}'

unbind '"'
bind - split-window -v -c '#{pane_current_path}'

unbind t
bind t new-window -c '#{pane_current_path}'

unbind r
bind r source-file ~/.config/tmux/tmux.conf

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z
bind = select-layout -E       # equalize panes in current layout
unbind x
bind-key BSpace kill-pane # skip "kill-pane 1? (y/n)" prompt (cmd+w)

unbind ,
unbind .
bind -r , swap-window -t -1\; select-window -t -1  # move window left
bind -r . swap-window -t +1\; select-window -t +1  # move window right

# telescope-like pane finder (prefix + f) — searches every pane/split across all windows
bind f display-popup -E -w 80% -h 80% -b rounded "tmux list-panes -a -F '#{pane_id} #{session_name}:#{window_index}.#{pane_index} │ #{window_name} │ #{pane_current_command} │ #{pane_current_path}' | fzf --prompt='  ' --border=rounded --header='Switch to tmux pane' --with-nth=2.. --preview='tmux capture-pane -ep -t {1}' --preview-window=down:60%:wrap --bind='tab:up,shift-tab:down' | awk '{print \$1}' | xargs -I{} tmux switch-client -t {}"


# Use vim keybindings in copy mode
setw    -g  mode-keys    vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection 'pbcopy'
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'pbcopy'
unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse
bind-key -T copy-mode-vi 'i' send-keys -X cancel
set -g mouse on


#tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
# set -g @plugin 'janoamaral/tokyo-night-tmux'

# restore nvim panes
set -g @continuum-boot 'on'
set -g @continuum-boot-options 'iterm'
set -g @continuum-restore 'on' # Restore last session on startup

# Initialize tpm plugin manager (must keep at the bottom of tmux.conf)
run -b '~/.config/tmux/plugins/tpm/tpm'
